services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bomberman
      POSTGRES_PASSWORD: bomberman
      POSTGRES_DB: bomberman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomberman -d bomberman"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://bomberman:bomberman@postgres:5432/bomberman
      REDIS_URL: redis://redis:6379
      GAME_TICK_MS: 250
      ROUND_TIMEOUT_SECONDS: 180
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
