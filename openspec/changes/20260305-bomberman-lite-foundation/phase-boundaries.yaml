version: 1
change_id: 20260305-bomberman-lite-foundation
base_branch: master
integration_branch: integration/20260305-bomberman-lite-foundation

shared_allow:
  - openspec/changes/20260305-bomberman-lite-foundation/**

deny:
  - .env
  - .env.local
  - .env.development
  - .env.production
  - "**/secrets/**"
  - "**/*.pem"

phases:
  - id: spec
    task_heading_match: "^## Phase Spec$"
    file_allow:
      - openspec/changes/20260305-bomberman-lite-foundation/**
      - openspec/specs/**
    gate_commands:
      - npx -y @fission-ai/openspec@latest validate --strict --all
    commit_type: spec

  - id: api
    task_heading_match: "^## Phase API$"
    file_allow:
      - openspec/changes/20260305-bomberman-lite-foundation/**
      - backend/**
      - package.json
      - infra/**
      - docker-compose.yml
      - .github/workflows/**
    gate_commands:
      - docker compose exec -T backend sh -lc "npm run lint"
      - docker compose exec -T backend sh -lc "npm run typecheck"
      - docker compose exec -T backend sh -lc "npm run test"
    commit_type: api

  - id: ui
    task_heading_match: "^## Phase UI$"
    file_allow:
      - openspec/changes/20260305-bomberman-lite-foundation/**
      - frontend/**
      - .github/workflows/**
    gate_commands:
      - docker compose exec -T frontend sh -lc "npm run lint"
      - docker compose exec -T frontend sh -lc "npm run typecheck"
      - docker compose exec -T frontend sh -lc "npm run test"
    commit_type: ui

  - id: fixes
    task_heading_match: "^## Phase Fixes$"
    file_allow:
      - openspec/changes/20260305-bomberman-lite-foundation/**
      - backend/**
      - frontend/**
      - scripts/**
      - infra/**
      - .github/workflows/**
    gate_commands:
      - docker compose exec -T backend sh -lc "npm run test"
      - docker compose exec -T frontend sh -lc "npm run test"
      - node scripts/verify-openapi-contract.mjs
    commit_type: fixes

  - id: docs
    task_heading_match: "^## Optional Phase Docs$"
    file_allow:
      - openspec/changes/20260305-bomberman-lite-foundation/**
      - openspec/specs/**
      - README.md
      - .env.example
      - .gitignore
      - docs/**
    gate_commands:
      - npx -y @fission-ai/openspec@latest validate --strict --all
    commit_type: docs
